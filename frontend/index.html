<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baatcheet | Pro</title>
    <style>
        :root { --dark: #000; --accent: #ff0055; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; overflow: hidden; }
        .app__container { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; gap: 0; }
        .video__box { position: relative; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        .video__element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .controls__bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); padding: 10px 20px; border-radius: 50px; }
        .btn { padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: 600; background: #222; color: white; }
        .btn--skip { background: var(--accent); }
        .meme-popup { position: absolute; width: 150px; z-index: 500; pointer-events: none; animation: pop 1.5s ease-out forwards; }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.5); opacity: 0; } }
    </style>
</head>
<body>
    <main class="app__container">
        <div class="video__box"><video id="localVideo" class="video__element" autoplay muted playsinline></video></div>
        <div class="video__box"><video id="remoteVideo" class="video__element" autoplay playsinline></video></div>
    </main>
    <div class="controls__bar">
        <button class="btn" onclick="app.toggleMedia('video')">Cam</button>
        <button class="btn" onclick="app.toggleMedia('audio')">Mic</button>
        <button class="btn" onclick="app.sendMeme('laugh')">😂</button>
        <button class="btn" onclick="app.sendMeme('mindblown')">🤯</button>
        <button class="btn btn--skip" onclick="window.location.reload()">SKIP</button>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        class BaatcheetApp {
            constructor() {
                this.pc = null;
                this.socket = io("https://project-baatcheet.onrender.com");
                this.init();
            }
            async init() {
                this.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = this.localStream;
                this.setupSocket();
            }
            setupSocket() {
                this.socket.emit('request-room');
                this.socket.on('room-created', async ({ roomId, offer }) => {
                    this.pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                    this.localStream.getTracks().forEach(t => this.pc.addTrack(t, this.localStream));
                    this.pc.onicecandidate = (e) => e.candidate && this.socket.emit('ice-candidate', { roomId, candidate: e.candidate });
                    this.pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
                    if (offer) {
                        const sdp = await this.pc.createOffer();
                        await this.pc.setLocalDescription(sdp);
                        this.socket.emit('offer', { roomId, sdp });
                    }
                });
                this.socket.on('offer', async ({ roomId, sdp }) => {
                    await this.pc.setRemoteDescription(new RTCSessionDescription(sdp));
                    const ans = await this.pc.createAnswer();
                    await this.pc.setLocalDescription(ans);
                    this.socket.emit('answer', { roomId, sdp: ans });
                });
                this.socket.on('answer', (data) => this.pc.setRemoteDescription(new RTCSessionDescription(data.sdp)));
                this.socket.on('ice-candidate', (c) => this.pc.addIceCandidate(new RTCIceCandidate(c)));
                this.socket.on('meme', (data) => this.displayMeme(data.url));
            }
            sendMeme(type) {
                const urls = { laugh: 'https://media.giphy.com/media/3o7TKMGpxxHOGTdzJC/giphy.gif', mindblown: 'https://media.giphy.com/media/3o7TKVun7iM8FMEU24/giphy.gif' };
                this.socket.emit('meme', { url: urls[type] });
                this.displayMeme(urls[type]);
            }
            displayMeme(url) {
                const img = document.createElement('img');
                img.src = url; img.className = 'meme-popup';
                img.style.left = Math.random() * 60 + 20 + '%';
                document.body.appendChild(img);
                setTimeout(() => img.remove(), 1500);
            }
            toggleMedia(kind) { this.localStream.getTracks().forEach(t => { if(t.kind === kind) t.enabled = !t.enabled; }); }
        }
        const app = new BaatcheetApp();
    </script>
</body>
</html>
