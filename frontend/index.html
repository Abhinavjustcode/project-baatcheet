<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baatcheet</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .app__container { display: flex; width: 100%; height: 100vh; }
        .video__box { flex: 1; position: relative; border: 1px solid #333; }
        .video__element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #skipBtn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; padding: 15px 30px; background: #ff0055; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app__container">
        <div class="video__box"><video id="localVideo" class="video__element" autoplay muted playsinline></video></div>
        <div class="video__box"><video id="remoteVideo" class="video__element" autoplay playsinline></video></div>
    </div>
    <button id="skipBtn">SKIP</button>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://project-baatcheet-backend.onrender.com"); // Yahan apna backend URL daal
        let localStream, pc, roomId;

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            localStream = stream;
            document.getElementById('localVideo').srcObject = stream;
            socket.emit('request-room');
        });

        socket.on('room-created', (data) => {
            roomId = data.roomId;
            pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
            pc.onicecandidate = (e) => e.candidate && socket.emit('ice-candidate', { roomId, candidate: e.candidate });

            if (data.offer) {
                pc.createOffer().then(sdp => { pc.setLocalDescription(sdp); socket.emit('offer', { roomId, sdp }); });
            }
        });

        socket.on('offer', (data) => {
            pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            pc.createAnswer().then(ans => { pc.setLocalDescription(ans); socket.emit('answer', { roomId, sdp: ans }); });
        });

        socket.on('answer', (data) => pc.setRemoteDescription(new RTCSessionDescription(data.sdp)));
        socket.on('ice-candidate', (c) => pc.addIceCandidate(new RTCIceCandidate(c)));
        document.getElementById('skipBtn').onclick = () => window.location.reload();
    </script>
</body>
</html>
