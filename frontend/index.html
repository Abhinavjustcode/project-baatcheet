<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baatcheet | Pro</title>
    <style>
        :root { --dark: #000; --accent: #ff0055; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; overflow: hidden; }
        .app__container { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
        .video__box { position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        .video__element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .controls__bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 50px; }
        .btn { padding: 8px 15px; border-radius: 20px; border: none; cursor: pointer; font-size: 18px; background: #222; }
        .btn--skip { background: var(--accent); color: white; font-size: 14px; font-weight: bold; }
        .meme-popup { position: absolute; width: 120px; z-index: 500; pointer-events: none; animation: pop 1.5s ease-out forwards; }
        @keyframes pop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.5); opacity: 0; } }
    </style>
</head>
<body>
    <main class="app__container">
        <div class="video__box"><video id="localVideo" class="video__element" autoplay muted playsinline></video></div>
        <div class="video__box"><video id="remoteVideo" class="video__element" autoplay playsinline></video></div>
    </main>
    <div class="controls__bar" id="controls"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const emojiBundle = ['ЁЯШВ', 'ЁЯдп', 'тЭдя╕П', 'ЁЯФе', 'ЁЯдг', 'ЁЯШО', 'ЁЯТй'];
        const controls = document.getElementById('controls');
        
        class BaatcheetApp {
            constructor() {
                this.socket = io("https://project-baatcheet.onrender.com");
                this.roomId = null;
                this.init();
            }
            async init() {
                this.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = this.localStream;
                this.setupSocket();
                this.renderButtons();
            }
            renderButtons() {
                emojiBundle.forEach(e => {
                    const b = document.createElement('button'); b.className = 'btn'; b.innerText = e;
                    b.onclick = () => this.sendMeme(e);
                    controls.appendChild(b);
                });
                const skip = document.createElement('button'); skip.className = 'btn btn--skip'; skip.innerText = 'SKIP';
                skip.onclick = () => this.skip();
                controls.appendChild(skip);
            }
            setupSocket() {
                this.socket.emit('request-room');
                this.socket.on('room-created', (d) => { this.roomId = d.roomId; this.startRTC(d); });
                this.socket.on('skip', () => window.location.reload());
                this.socket.on('meme', (data) => this.displayMeme(data.emoji));
            }
            startRTC(d) {
                this.pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                this.localStream.getTracks().forEach(t => this.pc.addTrack(t, this.localStream));
                this.pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
                this.pc.onicecandidate = (e) => e.candidate && this.socket.emit('ice-candidate', { roomId: d.roomId, candidate: e.candidate });
                if (d.offer) {
                    this.pc.createOffer().then(sdp => { this.pc.setLocalDescription(sdp); this.socket.emit('offer', { roomId: d.roomId, sdp }); });
                }
            }
            sendMeme(emoji) { this.socket.emit('meme', { roomId: this.roomId, emoji }); this.displayMeme(emoji); }
            displayMeme(emoji) {
                const div = document.createElement('div'); div.innerText = emoji; div.className = 'meme-popup';
                div.style.left = Math.random() * 80 + 10 + '%'; div.style.top = '40%';
                document.body.appendChild(div); setTimeout(() => div.remove(), 1500);
            }
            skip() { this.socket.emit('skip', this.roomId); window.location.reload(); }
        }
        const app = new BaatcheetApp();
    </script>
</body>
</html>
