<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omegle Clone</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 10px; color: #ff5722; }
        #status { margin-bottom: 20px; font-size: 18px; color: #aaa; font-weight: bold; }
        
        .video-container { display: flex; gap: 20px; margin-bottom: 20px; width: 100%; max-width: 900px; justify-content: center; flex-wrap: wrap; }
        .video-box { position: relative; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; width: 100%; max-width: 400px; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 14px; }

        .controls { display: flex; gap: 15px; }
        button { padding: 12px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 25px; font-weight: bold; transition: 0.2s; }
        #startBtn { background: #4CAF50; color: white; }
        #startBtn:hover { background: #45a049; }
        #skipBtn { background: #f44336; color: white; }
        #skipBtn:hover { background: #da190b; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
    </style>
</head>
<body>

    <h1>Stranger Chat</h1>
    <div id="status">Click Start to connect with a stranger</div>

    <div class="video-container">
        <div class="video-box">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">You</div>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label">Stranger</div>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">Start</button>
        <button id="skipBtn" disabled>Skip / Next</button>
    </div>

    <!-- Pulling Socket.io client directly from CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const startBtn = document.getElementById('startBtn');
        const skipBtn = document.getElementById('skipBtn');
        const statusEl = document.getElementById('status');

        let socket;
        let localStream;
        let peerConnection;
        let currentRoomId = null;

        const configuration = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        // 1. Initialize Camera on Load
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
            } catch (err) {
                alert("Please allow camera and microphone access to use this app.");
                console.error(err);
            }
        }
        initCamera();

        // 2. Start button logic
        startBtn.onclick = () => {
            if (!localStream) return alert("Camera not ready yet!");
            startBtn.disabled = true;
            skipBtn.disabled = false;
            
            // Connect to your backend
            socket = io("http://localhost:3000"); 
            setupSocketListeners();
        };

        // 3. Skip button logic
        skipBtn.onclick = () => {
            if (peerConnection) peerConnection.close();
            remoteVideo.srcObject = null;
            socket.disconnect(); // Drop current connection
            
            // Immediately reconnect to find someone new
            socket = io("http://localhost:3000");
            setupSocketListeners();
        };

        // 4. Handle all Signaling
        function setupSocketListeners() {
            socket.on("lobby", () => {
                statusEl.innerText = "Looking for a stranger...";
                remoteVideo.srcObject = null;
            });

            socket.on("send-offer", async ({ roomId }) => {
                currentRoomId = roomId;
                createPeerConnection();
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit("offer", { sdp: offer, roomId });
            });

            socket.on("offer", async ({ sdp, roomId }) => {
                currentRoomId = roomId;
                createPeerConnection();
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit("answer", { sdp: answer, roomId });
            });

            socket.on("answer", async ({ sdp }) => {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
            });

            socket.on("add-ice-candidate", async ({ candidate }) => {
                if (peerConnection && candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                }
            });
        }

        // 5. Setup WebRTC Peer Connection
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);

            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                statusEl.innerText = "Connected! Say Hi!";
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("add-ice-candidate", { 
                        candidate: event.candidate, 
                        roomId: currentRoomId
                    });
                }
            };
        }
    </script>
</body>
</html>
