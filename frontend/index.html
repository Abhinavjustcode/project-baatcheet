<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baatcheet | Pro</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .app__container { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
        .video__box { position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        .video__element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .controls__bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; }
        .btn { padding: 10px 15px; border-radius: 20px; border: none; cursor: pointer; background: #222; color: white; }
        .btn--skip { background: #ff0055; font-weight: bold; }
    </style>
</head>
<body>
    <main class="app__container">
        <div class="video__box"><video id="localVideo" class="video__element" autoplay muted playsinline></video></div>
        <div class="video__box"><video id="remoteVideo" class="video__element" autoplay playsinline></video></div>
    </main>
    
    <div class="controls__bar" id="controls"></div>

    <!-- Meme Video Overlay -->
    <video id="memeVideo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; object-fit:cover;">
        <source src="https://raw.githubusercontent.com/Abhinavjustcode/project-baatcheet/main/ruko-zara-sabar-karo.mp4" type="video/mp4">
    </video>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        class BaatcheetApp {
            constructor() {
                this.socket = io("https://project-baatcheet.onrender.com");
                this.roomId = null;
                this.init();
            }
            async init() {
                this.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = this.localStream;
                this.setupControls();
                this.socket.emit('request-room');
                this.setupSocketEvents();
            }
            setupControls() {
                const s = document.createElement('button'); s.className = 'btn btn--skip'; s.innerText = 'SKIP';
                s.onclick = () => this.skip();
                document.getElementById('controls').appendChild(s);
            }
            skip() {
                this.socket.emit('skip', this.roomId);
                const v = document.getElementById('memeVideo');
                v.style.display = 'block'; v.play();
                v.onended = () => window.location.reload();
            }
            setupSocketEvents() {
                this.socket.on('room-created', (d) => { this.roomId = d.roomId; this.startRTC(d); });
                this.socket.on('skip', () => window.location.reload());
            }
            startRTC(d) {
                this.pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                this.localStream.getTracks().forEach(t => this.pc.addTrack(t, this.localStream));
                this.pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
                this.pc.onicecandidate = (e) => e.candidate && this.socket.emit('ice-candidate', { roomId: d.roomId, candidate: e.candidate });
                if(d.offer) this.pc.createOffer().then(sdp => { this.pc.setLocalDescription(sdp); this.socket.emit('offer', { roomId: d.roomId, sdp }); });
                this.socket.on('offer', (d) => { this.pc.setRemoteDescription(new RTCSessionDescription(d.sdp)); this.pc.createAnswer().then(ans => { this.pc.setLocalDescription(ans); this.socket.emit('answer', { roomId: d.roomId, sdp: ans }); }); });
                this.socket.on('answer', (d) => this.pc.setRemoteDescription(new RTCSessionDescription(d.sdp)));
                this.socket.on('ice-candidate', (c) => this.pc.addIceCandidate(new RTCIceCandidate(c)));
            }
        }
        new BaatcheetApp();
    </script>
</body>
</html>
