<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baatcheet | Production Grade</title>
    <style>
        /* BEM CSS Methodology */
        :root { --dark: #000; --accent: #ff0055; }
        body { margin: 0; background: var(--dark); color: white; font-family: sans-serif; overflow: hidden; }

        .app__container { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; gap: 0; }
        .video__box { position: relative; overflow: hidden; background: #111; }
        .video__element { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .controls__bar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 10;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 50px;
        }
        .btn { padding: 12px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }
        .btn--skip { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <main class="app__container">
        <div class="video__box"><video id="localVideo" class="video__element" autoplay muted playsinline></video></div>
        <div class="video__box"><video id="remoteVideo" class="video__element" autoplay playsinline></video></div>
    </main>

    <div class="controls__bar">
        <button class="btn" onclick="app.toggleMedia('video')">Cam</button>
        <button class="btn" onclick="app.toggleMedia('audio')">Mic</button>
        <button class="btn btn--skip" onclick="window.location.reload()">SKIP</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        class BaatcheetApp {
            constructor() {
                this.pc = null;
                this.localStream = null;
                this.socket = io("https://project-baatcheet.onrender.com");
                this.init();
            }

            async init() {
                this.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = this.localStream;
                this.setupSocket();
            }

            setupSocket() {
                this.socket.emit('request-room');
                this.socket.on('room-created', async ({ roomId, offer }) => {
                    this.pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                    this.localStream.getTracks().forEach(t => this.pc.addTrack(t, this.localStream));
                    this.pc.onicecandidate = (e) => e.candidate && this.socket.emit('ice-candidate', { roomId, candidate: e.candidate });
                    this.pc.ontrack = (e) => document.getElementById('remoteVideo').srcObject = e.streams[0];
                    
                    if (offer) {
                        const sdp = await this.pc.createOffer();
                        await this.pc.setLocalDescription(sdp);
                        this.socket.emit('offer', { roomId, sdp });
                    }
                });
                
                this.socket.on('offer', async (sdp) => {
                    await this.pc.setRemoteDescription(new RTCSessionDescription(sdp));
                    const ans = await this.pc.createAnswer();
                    await this.pc.setLocalDescription(ans);
                    this.socket.emit('answer', { roomId: 'room', sdp: ans });
                });

                this.socket.on('answer', (sdp) => this.pc.setRemoteDescription(new RTCSessionDescription(sdp)));
                this.socket.on('ice-candidate', (c) => this.pc.addIceCandidate(new RTCIceCandidate(c)));
            }

            toggleMedia(kind) {
                this.localStream.getTracks().forEach(t => { if(t.kind === kind) t.enabled = !t.enabled; });
            }
        }

        const app = new BaatcheetApp();
    </script>
</body>
</html>
